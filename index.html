<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Calculator</h1>
    </div>
    
    <div class="container">
        <div class="output">
            
        </div>
        <div class="inputs">
            <div class="input num">1</div>
            <div class="input num">2</div>
            <div class="input num">3</div>
            <div class="input num">4</div>
            <div class="input num">5</div>
            <div class="input num">6</div>
            <div class="input num">7</div>
            <div class="input num">8</div>
            <div class="input num">9</div>
            <div class="input num">0</div>
            <div class="input operand">+</div>
            <div class="input operand">-</div>
            <div class="input operand">/</div>
            <div class="input operand">*</div>
            <div class="input equals" style="background-color: blue;">=</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
